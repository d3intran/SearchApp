<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>标准综合查询器</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <!-- 自定义标题栏 -->
  <header class="titlebar" data-tauri-drag-region>
    <span class="titlebar-title" data-tauri-drag-region>标准综合查询器</span>
    <div class="titlebar-actions">
      <button id="btnBrowse" class="titlebar-btn" title="浏览已解析标准">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </button>
      <button id="btnSettings" class="titlebar-btn" title="设置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button id="btnMinimize" class="titlebar-btn" title="最小化">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
      </button>
      <button id="btnMaximize" class="titlebar-btn" title="最大化">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="5" width="14" height="14" rx="1"/></svg>
      </button>
      <button id="btnClose" class="titlebar-btn titlebar-btn-close" title="关闭">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
  </header>

  <div class="app">
    <!-- 顶部：输入区 + 查询按钮 + 数据源配置 -->
    <section class="card config-card">
      <div class="config-layout">
        <div class="input-section">
          <label class="field-label">输入标准名或标准号（支持模糊查询）</label>
          <input type="text" id="standardInput" class="text-input" placeholder="例如：GB/T 28435-2012" />
        </div>

        <div class="query-section">
          <button id="btnQuery" class="btn btn-primary">查询</button>
        </div>

        <div class="datasource-section">
          <div class="ds-grid">
            <div class="ds-item">
              <label class="field-label">CNAS附表</label>
              <button id="btnCnasFile" class="btn btn-small">选择文件...</button>
              <div id="cnasFileList" class="file-list"><span class="file-list-empty">未加载</span></div>
            </div>
            <div class="ds-item">
              <label class="field-label">CMA附表</label>
              <button id="btnCmaFile" class="btn btn-small">选择文件...</button>
              <div id="cmaFileList" class="file-list"><span class="file-list-empty">未加载</span></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 中部：标准有效性查询结果 -->
    <section class="card validity-card">
      <div class="card-header">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
        </svg>
        <span class="card-title">标准有效性查询结果</span>
        <span id="validitySpinner" class="spinner hidden"></span>
      </div>
      <div id="validityResult" class="result-text placeholder">请输入标准号后点击查询</div>
    </section>

    <!-- 底部：三栏结果面板 -->
    <section class="panels">
      <div class="card panel">
        <div class="card-header">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/>
          </svg>
          <span class="card-title">CNAS附表查询结果</span>
          <span id="cnasSpinner" class="spinner hidden"></span>
        </div>
        <div id="cnasResult" class="result-text placeholder">等待查询...</div>
      </div>

      <div class="card panel">
        <div class="card-header">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
          <span class="card-title">CMA附表查询结果</span>
          <span id="cmaSpinner" class="spinner hidden"></span>
        </div>
        <div id="cmaResult" class="result-text placeholder">等待查询...</div>
      </div>

      <div class="card panel">
        <div class="card-header">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <span class="card-title">CMA能力项目库查询结果</span>
          <span id="cmaApiSpinner" class="spinner hidden"></span>
        </div>
        <div id="cmaApiResult" class="result-text placeholder">等待查询...</div>
      </div>
    </section>
  </div>

  <!-- 设置弹窗 -->
  <div id="settingsModal" class="modal-overlay hidden">
    <div class="modal card">
      <div class="modal-header">
        <span class="card-title">设置</span>
        <button id="btnCloseSettings" class="modal-close" title="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="ds-item">
          <label class="field-label">CMA能力项目库网址</label>
          <input type="text" id="cmaUrl" class="text-input" />
        </div>
        <div class="ds-item">
          <label class="field-label">全国标准信息平台网址</label>
          <input type="text" id="samrUrl" class="text-input" />
        </div>
        <div class="update-row">
          <span id="settingsStatus" class="settings-status"></span>
        </div>
        <div id="updateProgress" class="update-progress hidden">
          <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
          <span id="progressText" class="progress-text">0%</span>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btnCheckUpdate" class="btn btn-primary">检查软件更新</button>
        <button id="btnSaveSettings" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- 浏览已解析标准弹窗 -->
  <div id="browseModal" class="modal-overlay hidden">
    <div class="modal card browse-modal">
      <div class="modal-header">
        <span class="card-title">已解析标准</span>
        <button id="btnCloseBrowse" class="modal-close" title="关闭">×</button>
      </div>
      <div class="browse-search">
        <input type="text" id="browseSearch" class="text-input" placeholder="搜索标准号或名称..." />
      </div>
      <div id="browseList" class="browse-list"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
